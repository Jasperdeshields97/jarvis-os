# Jarvis OS — Jasper DeSHields
# Three-pillar personal operating system
# Deploy: copy to /root/.openjarvis/config.toml on Hetzner Jarvis-01
#
# Pillars:
#   LIFE     — fitness, family, mental, schedule
#   BUSINESS — Comeback Code engine + Vitalize supplements
#   BRAND    — IG / TikTok / YouTube / UGC / brand deals

[intelligence]
default_model = "claude-haiku-4-5"
fallback_model = "claude-sonnet-4-6"
provider = "anthropic"
temperature = 0.3
max_tokens = 4096

[engine]
default = "anthropic"

[engine.anthropic]
api_key = "${ANTHROPIC_API_KEY}"

[agent]
default_agent = "orchestrator"
max_turns = 20
context_from_memory = true

[tools]
enabled = [
  "web_search",
  "file_read",
  "knowledge_search",
  "knowledge_sql",
  "memory_store",
  "memory_search",
  "digest_collect",
  "think",
  "shell_exec",
]

[tools.storage]
default_backend = "sqlite"
db_path = "/root/.openjarvis/memory.db"

[tools.mcp]
enabled = true

[server]
host = "0.0.0.0"
port = 8001
agent = "orchestrator"

[channel.telegram]
enabled = true
bot_token = "${JARVIS_TELEGRAM_BOT_TOKEN}"
allowed_users = ["${JASPER_TELEGRAM_USER_ID}"]

[channel.webchat]
enabled = true

[digest]
enabled = true
schedule = "0 11 * * *"
timezone = "America/New_York"
persona = "jarvis"
honorific = "boss"
tts_backend = "none"
sections = ["health", "calendar", "messages", "world"]

[digest.health]
sources = ["whoop"]
max_items = 3

[digest.calendar]
sources = ["gcalendar"]
max_items = 8

[digest.messages]
sources = ["gmail", "github_notifications"]
max_items = 10
priority_contacts = [
  "jasperdeshields1@gmail.com",
]

[digest.world]
sources = ["weather"]
max_items = 1

# LIFE pillar — WHOOP (replaces Strava)
[connectors.whoop]
client_id     = "${WHOOP_CLIENT_ID}"
client_secret = "${WHOOP_CLIENT_SECRET}"
refresh_token = "${WHOOP_REFRESH_TOKEN}"

[connectors.weather]
api_key          = "e2ab2c7df4fd346d3289ed54fb030619"
default_location = "Newark, NJ"
units            = "imperial"

# LIFE + BUSINESS pillar
[connectors.gcalendar]
credentials_path = "/root/.openjarvis/google_credentials.json"
token_path       = "/root/.openjarvis/google_token.json"

[connectors.gmail]
credentials_path = "/root/.openjarvis/google_credentials.json"
token_path       = "/root/.openjarvis/google_token.json"

# BUSINESS pillar
[connectors.github]
token = "${GITHUB_TOKEN}"
watch_repos = [
  "Jasperdeshields97/jarvis-dashboard",
  "Jasperdeshields97/health-ecosystem",
  "Jasperdeshields97/jarvis-os",
  "Jasperdeshields97/comeback-quiz",
]

[learning]
enabled = true

[learning.routing]
policy = "heuristic"

[learning.optimize]
enabled = true

[learning.optimize.personal]
enabled = true

[traces]
enabled = true
db_path = "/root/.openjarvis/traces.db"

[prompt]
persona = "jarvis"

[security]
enabled = true

[telemetry]
enabled = false
